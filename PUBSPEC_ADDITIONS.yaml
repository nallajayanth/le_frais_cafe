# Required pubspec.yaml additions for backend integration

# Add these dependencies to your existing pubspec.yaml

dependencies:
  # HTTP & API
  http: ^1.1.0                          # HTTP client
  dio: ^5.3.0                            # Alternative HTTP with better features
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0        # Secure token storage
  shared_preferences: ^2.2.0            # Local preferences
  
  # State Management (if not already added)
  provider: ^6.1.0                      # State management
  
  # WebSocket
  web_socket_channel: ^3.0.0            # Real-time updates
  
  # JSON serialization
  json_serializable: ^6.7.0             # Auto JSON parsing
  json_annotation: ^4.8.0               # JSON annotations
  
  # Utilities
  intl: ^0.19.0                         # Internationalization
  uuid: ^4.0.0                          # Unique IDs
  
  # Image handling
  cached_network_image: ^3.3.0          # Cache images
  image_picker: ^1.0.0                  # Pick images
  
  # Location (for delivery)
  geolocator: ^9.0.0                    # GPS/location
  google_maps_flutter: ^2.5.0           # Google Maps
  
  # Local notifications
  flutter_local_notifications: ^16.0.0  # Local notifications
  
  # QR Code (for dine-in)
  qr_code_scanner: ^0.1.0               # Scan QR codes
  qr: ^3.0.0                            # Generate QR codes
  
  # Payment (choose one or more)
  razorpay_flutter: ^1.3.0              # Razorpay (India)
  stripe_flutter: ^9.0.0                # Stripe (International)
  
dev_dependencies:
  build_runner: ^2.4.0                  # Code generation
  json_serializable: ^6.7.0

# Run these commands after updating pubspec.yaml:
# flutter pub get
# flutter pub run build_runner build
